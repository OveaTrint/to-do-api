  /api/token/refresh/:
    post:
      operationId: api_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /todos:
    get:
      operationId: todos_list
      description: |-
        Groups all the views using a Viewset since they all the HTTP methods use the same path.
        The GET method to retrieve all Todos is implemented automatically by the viewset's list() method
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - todos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedToDoList'
          description: ''
    post:
      operationId: todos_create
      description: |-
        Groups all the views using a Viewset since they all the HTTP methods use the same path.
        The GET method to retrieve all Todos is implemented automatically by the viewset's list() method
      tags:
      - todos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToDo'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ToDo'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ToDo'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToDo'
          description: ''
  /todos/{id}:
    get:
      operationId: todos_retrieve
      description: |-
        Groups all the views using a Viewset since they all the HTTP methods use the same path.
        The GET method to retrieve all Todos is implemented automatically by the viewset's list() method
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this to do.
        required: true
      tags:
      - todos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToDo'
          description: ''
    put:
      operationId: todos_update
      description: |-
        Groups all the views using a Viewset since they all the HTTP methods use the same path.
        The GET method to retrieve all Todos is implemented automatically by the viewset's list() method
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this to do.
        required: true
      tags:
      - todos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToDo'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ToDo'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ToDo'
        required: true
      security:
